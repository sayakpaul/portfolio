project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "archive/*.qmd"
    - "notes/*.qmd"
    - "pages/*.qmd"
    - "posts/*.qmd"

format:
  html:
    theme: default
    css: site.css
    toc: false
    highlight-style: github-dark
    include-before-body: _nav.html

website:
  title: Anshuman Mishra
  site-url: "https://www.heyyanshuman.com"
  description: "Machine learning engineer building AI systems, open source software, and essays."
  google-analytics: "G-EKSMXY3E8G"
  favicon: assets/images/favicon.png
  search: false
  twitter-card:
    creator: "@athleticKoder"
    card-style: summary
  open-graph: true

execute:
  freeze: auto

resources:
  - CNAME
